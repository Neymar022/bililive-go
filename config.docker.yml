rpc:
  enable: true
  bind: :8080
debug: false
interval: 20
out_put_path: /srv/bililive-source
app_data_path: /srv/bililive/.appdata
read_only_tool_folder: /opt/bililive/tools
feature:
  use_native_flv_parser: false
live_rooms:

# 通知服务配置
notify:
  telegram:
    # 是否开启Telegram通知
    enable: false
    # 是否启用声音通知
    withNotification: true
    # Telegram机器人Token
    botToken: ""
    # Telegram聊天ID
    chatID: ""
  email:
    # 是否开启Email通知
    enable: false
    # SMTP服务器地址 (例如: smtp.gmail.com, smtp.qq.com等)
    smtpHost: "smtp.qq.com"
    # SMTP服务器端口 (常用端口: 25, 465, 587)
    smtpPort: 465
    # 发送者邮箱地址
    senderEmail: ""
    # 发送者邮箱授权码或应用专用密码
    senderPassword: ""
    # 接收者邮箱地址 
    recipientEmail: ""
  ntfy:
    enable: false
    URL: https://ntfy.sh/xxxx
    token: tk_xxxxxxxxx
    tag: new

# 字幕增强配置
subtitle:
  # 启用后会在录制转 MP4 成功后自动生成 SRT 和烧录版
  enabled: false
  auto_generate: true
  default_provider: dashscope
  # 原始录屏根目录，供 bililive-go 与 subtitle-worker 共享
  source_root: /srv/bililive-source
  # 正式展示目录，建议由外部脚本整理成绿联可扫描的剧集结构
  library_root: /srv/bililive
  # DashScope 文件转写要求可公网访问的音频 URL。
  # 若只使用 local-whisper，可留空。
  public_url_base: ""
  retention_days: 7
  language: zh
  local:
    model: small
    compute_type: int8
  cloud:
    vendor: aliyun
    model: qwen3-asr-flash-filetrans
  burn_style:
    preset: vizard_classic_cn
    font_name: Noto Sans CJK SC
    font_size: 24
    margin_v: 24
    outline: 2
    shadow: 0
